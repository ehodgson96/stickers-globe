<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shroom Sticker Globe" />
    <meta
      property="og:url"
      content="https://ehodgson96.github.io/stickers-globe/"
    />
    <meta property="og:title" content="Shroom Sticker Globe" />
    <meta
      property="og:description"
      content="Spin the globe and discover sticker drops around the world."
    />
    <meta
      property="og:image"
      content="https://ehodgson96.github.io/stickers-globe/assets/materials/ShroomSquad.png"
    />
    <meta property="og:image:width" content="630" />
    <meta property="og:image:height" content="630" />
    <meta name="theme-color" content="#0a0a0a" />
    <link
      rel="icon"
      href="./assets/materials/MapPointer.png"
      type="image/png"
    />
    <title>Shroom Sticker Globe</title>
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="loading-overlay">
      <div class="loading-content">
        <div class="loading-ring">
          <svg class="ring-svg" viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="45" />
            <circle class="ring-progress" cx="50" cy="50" r="45" />
          </svg>
          <img
            src="./assets/materials/ShroomSquad.png"
            alt="Shroom Squad Logo"
            class="loading-logo"
          />
        </div>
        <div class="loading-text">Loading...</div>
      </div>
    </div>
    <div class="container">
      <div id="globe-container">
        <div class="logo">
          <img
            src="./assets/materials/ShroomSquad.png"
            alt="Shroom Squad Logo"
          />
        </div>
        <div class="controls minimised" id="controls">
          <p>🖱️ Drag to orbit</p>
          <p>🔍 Scroll to zoom</p>
          <p>
            📍 Click a marker <br />
            to open details
          </p>
        </div>
        <button
          class="controls-toggle"
          id="controls-toggle"
          type="button"
          aria-controls="controls"
          aria-expanded="false"
        >
          + CONTROLS +
        </button>
        <button
          id="sidebar-toggle"
          class="sidebar-toggle"
          type="button"
          aria-expanded="true"
          aria-label="Toggle sidebar"
          title="Toggle Sidebar"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 6h18M3 12h18M3 18h18"/>
          </svg>
        </button>
        <button
          id="settings-cog"
          class="settings-cog"
          type="button"
          aria-controls="settings-panel"
          aria-expanded="false"
          aria-label="Open secret settings"
          title="Secret Settings"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M10.4 2.4h3.2l.6 2.2c.6.2 1.1.4 1.6.7l2-1 2.2 2.2-1 2c.3.5.5 1 .7 1.6l2.3.6v3.2l-2.3.6c-.2.6-.4 1.1-.7 1.6l1 2-2.2 2.2-2-1c-.5.3-1 .5-1.6.7l-.6 2.3h-3.2l-.6-2.3c-.6-.2-1.1-.4-1.6-.7l-2 1L3.2 19.6l1-2c-.3-.5-.5-1-.7-1.6l-2.3-.6v-3.2l2.3-.6c.2-.6.4-1.1.7-1.6l-1-2 2.2-2.2 2 1c.5-.3 1-.5 1.6-.7l.6-2.2zM12 9a3 3 0 100 6 3 3 0 000-6z"
            />
          </svg>
        </button>
        <aside
          id="settings-panel"
          class="settings-panel"
          aria-label="Secret settings"
          aria-hidden="true"
        >
          <div class="settings-header">
            <span>SYS MENU</span>
            <button id="settings-close" type="button" aria-label="Close settings">
              X
            </button>
          </div>
          <div class="settings-fps">
            <span>FPS</span>
            <strong id="fps-counter">0</strong>
          </div>
          <div id="settings-effects" class="settings-effects"></div>
        </aside>
        <div
          id="sticker-popout"
          class="sticker-popout hidden"
          aria-live="polite"
        >
          <button class="popout-close" title="Close">✕</button>
          <div class="popout-image-wrap">
            <img id="popout-image" src="" alt="Sticker photo" />
          </div>
          <div class="popout-body">
            <div class="popout-title" id="popout-title"></div>
            <div class="popout-meta">
              <span id="popout-date"></span>
              <span class="dot">•</span>
              <span id="popout-likes"></span>
            </div>
            <div class="popout-coords" id="popout-coords"></div>
            <a
              id="popout-link"
              class="popout-link"
              target="_blank"
              rel="noopener"
              >Open Instagram ↗</a
            >
          </div>
        </div>
      </div>
      <div class="sidebar">
        <div class="header">
          <h1>+ STICKER SPOTS +</h1>
          <p>Our global sticker collection</p>
        </div>
        <div class="sticker-count" id="sticker-count"></div>
        <div id="sticker-list"></div>
      </div>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
